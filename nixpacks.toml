[variables]
NIXPACKS_NODE_VERSION = "24"

[phases.setup]
nixPkgs = ["nodejs_24", "npm-10_x"]

[phases.install]
# Keep install lightweight; real install runs in build after Nixpacks re-COPY.
cmds = ["npm ci --include=dev"]

[phases.build]
# Re-run install after Nixpacks re-COPY between phases (keeps node_modules for nuxt/vite).
cmds = [
  "npm ci --include=dev",
  "NODE_ENV=production npm run build"
]

[start]
cmd = "NODE_ENV=production npm run start"
