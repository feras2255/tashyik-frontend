[variables]
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixPkgs = ["nodejs_22", "npm-10_x"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
# Re-run install after Nixpacks re-COPY between phases (keeps node_modules for vite/nuxt).
cmds = ["npm ci", "npm run build"]

[start]
cmd = "npm run start"
