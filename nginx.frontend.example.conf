# Example: static Nuxt output (`nuxt generate`) behind nginx.
# Adjust `root` to your deploy folder (often the generated `public/` or `.output/public`).

server {
    listen 80;
    server_name example.com;
    root /var/www/tashyik-frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: cache immutable assets
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
